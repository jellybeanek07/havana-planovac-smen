<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a2e" />
<link rel="manifest" href="manifest.json" />
<title>Admin – Plánovač směn</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #f0f2f5; --card: #fff; --text: #1a1a1a; --text2: #666;
    --border: #e0e0e0; --primary: #1a1a2e; --primary2: #2d2d50;
    --blue-bg: #dbeafe; --blue: #1d4ed8;
    --orange-bg: #fef3c7; --orange: #b45309;
    --green: #1a7a40; --green-bg: #e6f9ee;
    --red: #b00020; --red-bg: #fdecea;
    --warn-bg: #fff7ed; --warn: #c2410c;
  }
  [data-theme="dark"] {
    --bg: #0f0f1a; --card: #1e1e2e; --text: #e0e0e0; --text2: #999;
    --border: #333; --primary: #3a3a6e; --primary2: #4a4a8e;
    --blue-bg: #1a2a4a; --blue: #7ab3e0;
    --orange-bg: #2a1a0a; --orange: #f59e0b;
    --green: #4ade80; --green-bg: #0a2a1a;
    --red: #f87171; --red-bg: #2a0a0a;
    --warn-bg: #1a1000; --warn: #fb923c;
  }
  * { box-sizing: border-box; font-family: -apple-system, Arial, sans-serif; transition: background 0.2s, color 0.2s; }
  body { margin: 0; background: var(--bg); color: var(--text); }
  .header { background: var(--primary); color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { margin: 0; font-size: 18px; }
  .header-btns { display: flex; gap: 8px; }
  .hbtn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .container { max-width: 960px; margin: 0 auto; padding: 12px; }
  .card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid var(--border); }
  .card h2 { margin: 0 0 12px; font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, button { font-family: inherit; }
  input[type=text], input[type=password], input[type=date], input[type=number], select { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--card); color: var(--text); outline: none; }
  input:focus, select:focus { border-color: var(--blue); }
  .btn { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-dark { background: var(--primary); color: white; }
  .btn-outline { background: var(--card); border: 1.5px solid var(--border); color: var(--text); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1.5px solid var(--red); }
  .btn-export { background: var(--blue-bg); color: var(--blue); border: 1.5px solid var(--blue); }
  .btn-copy { background: var(--warn-bg); color: var(--warn); border: 1.5px solid var(--warn); }
  .week-badge { display: inline-block; background: var(--blue-bg); color: var(--blue); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
  .week-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .week-tab { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-size: 13px; color: var(--text); }
  .week-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
  .req-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 8px; }
  .req-card { border: 1.5px solid var(--border); border-radius: 10px; padding: 10px; font-size: 12px; position: relative; }
  .req-card .rname { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  .req-card .rdept { color: var(--text2); margin-bottom: 6px; }
  .req-card .rday { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid var(--border); }
  .req-card .rday:last-child { border: none; }
  .avail { color: var(--green); font-weight: 600; }
  .del-btn { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--border); cursor: pointer; font-size: 16px; padding: 0; line-height: 1; }
  .del-btn:hover { color: var(--red); }
  .sched-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sched-table th { background: var(--bg); padding: 8px 6px; text-align: left; border-bottom: 2px solid var(--border); font-size: 11px; color: var(--text2); }
  .sched-table td { padding: 6px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .shift-slot { display: flex; align-items: center; gap: 5px; background: var(--bg); border-radius: 6px; padding: 5px 7px; margin-bottom: 4px; }
  .dept-badge { border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .badge-bar { background: var(--blue-bg); color: var(--blue); }
  .badge-kuchyne { background: var(--orange-bg); color: var(--orange); }
  .time-input { width: 85px; padding: 3px 6px; border: 1px solid var(--border); border-radius: 5px; font-size: 11px; background: var(--card); color: var(--text); }
  .rm-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 13px; margin-left: auto; }
  .rm-btn:hover { color: var(--red); }
  .add-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-top: 4px; }
  .add-row select, .add-row button { font-size: 12px; padding: 4px 8px; border-radius: 6px; }
  .cov-row { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
  .cov-badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .cov-ok { background: var(--green-bg); color: var(--green); }
  .cov-warn { background: var(--red-bg); color: var(--red); }
  #view-login { max-width: 340px; margin: 60px auto; }
  #login-error { color: var(--red); font-size: 13px; display: none; margin-bottom: 8px; }
  #export-preview { display: none; position: fixed; top: -9999px; left: 0; }
  #exp-tbl { border-collapse: collapse; font-size: 12px; min-width: 600px; }
  #exp-tbl th { background: #1a1a2e; color: white; padding: 8px 10px; }
  #exp-tbl td { border: 1px solid #ccc; padding: 6px 10px; background: white; color: #111; }
  #exp-tbl .exp-bar { background: #dbeafe; color: #1d4ed8; padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 11px; }
  #exp-tbl .exp-kuchyne { background: #fef3c7; color: #b45309; padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 11px; }
  .notif-dot { background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; margin-left: 6px; }

  /* POČASÍ */
  .weather-now { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .wn-icon { font-size: 40px; line-height: 1; }
  .wn-temp { font-size: 28px; font-weight: 700; }
  .wn-desc { font-size: 13px; color: var(--text2); }
  .wn-details { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .weather-grid { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .weather-day { flex: 0 0 auto; min-width: 82px; text-align: center; background: var(--bg); border-radius: 10px; padding: 8px 6px; border: 1px solid var(--border); }
  .weather-day.today { border-color: var(--blue); background: var(--blue-bg); }
  .wd-name { font-size: 11px; font-weight: 700; color: var(--text2); margin-bottom: 2px; }
  .wd-date { font-size: 10px; color: var(--text2); margin-bottom: 4px; }
  .wd-icon { font-size: 26px; line-height: 1; margin-bottom: 4px; }
  .wd-temp { font-size: 13px; font-weight: 700; color: var(--text); }
  .wd-temp span { font-size: 11px; font-weight: 400; color: var(--text2); }
  .wd-rain { font-size: 10px; color: var(--blue); margin-top: 3px; }
  .wd-wind { font-size: 10px; color: var(--text2); margin-top: 2px; }
  #weather-error { font-size: 13px; color: var(--red); background: var(--red-bg); border: 1px solid var(--red); border-radius: 8px; padding: 10px; }
  #weather-error code { font-family: monospace; font-size: 11px; background: rgba(0,0,0,0.1); padding: 2px 5px; border-radius: 3px; word-break: break-all; }
</style>
</head>
<body>

<div id="view-login">
  <div class="card">
    <h2>🔒 Admin přihlášení</h2>
    <p id="login-error">Špatné heslo.</p>
    <input type="password" id="admin-pw" placeholder="Heslo" style="width:100%; margin-bottom:10px;" />
    <button class="btn btn-dark" style="width:100%;" id="login-btn">Přihlásit se</button>
  </div>
</div>

<div id="view-admin" style="display:none;">
  <div class="header">
    <div>
      <h1>⚙️ Admin – Plánovač směn</h1>
    </div>
    <div class="header-btns">
      <button class="hbtn" id="theme-btn">🌙</button>
      <button class="hbtn" id="logout-btn">Odhlásit</button>
    </div>
  </div>

  <div class="container">

    <!-- POČASÍ -->
    <div class="card" id="weather-card">
      <h2>🌤️ Počasí – Suchý u Boskovic <span style="font-weight:400; text-transform:none; font-size:12px;">(663 m n.m.)</span></h2>
      <div id="weather-body">
        <div style="font-size:13px; color:var(--text2);">Načítám počasí…</div>
      </div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-top:10px; flex-wrap:wrap; gap:8px;">
        <div style="font-size:11px; color:var(--text2);" id="weather-source">Zdroj: Open-Meteo.com</div>
        <div style="display:flex; gap:6px;">
          <button class="btn btn-outline" id="weather-reload-btn" style="font-size:12px; padding:6px 12px;">🔄 Načíst znovu</button>
          <button class="btn btn-export" id="weather-export-btn" style="font-size:12px; padding:6px 12px;">📸 Export počasí</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📆 Nastavení týdne</h2>
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end;">
        <div>
          <label style="font-size:12px; color:var(--text2); display:block; margin-bottom:3px;">Pondělí 1. týdne</label>
          <input type="date" id="week-picker" />
        </div>
        <button class="btn btn-dark" id="set-week-btn">Nastavit</button>
        <div id="active-badge"></div>
      </div>
      <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:12px; align-items:flex-end;">
        <div>
          <label style="font-size:12px; color:var(--text2); display:block; margin-bottom:3px;">Min. Bar</label>
          <input type="number" id="min-bar" min="0" max="10" value="1" style="width:65px;" />
        </div>
        <div>
          <label style="font-size:12px; color:var(--text2); display:block; margin-bottom:3px;">Min. Kuchyně</label>
          <input type="number" id="min-kuchyne" min="0" max="10" value="1" style="width:65px;" />
        </div>
        <button class="btn btn-outline" id="save-min-btn">Uložit minimum</button>
      </div>
    </div>

    <div class="card">
      <h2>🕐 Historie týdnů</h2>
      <div class="week-tabs" id="week-tabs"></div>
    </div>

    <div class="card">
      <h2>👥 Dostupnost <span id="req-label" style="font-weight:400; text-transform:none;"></span><span id="notif-dot" style="display:none;" class="notif-dot">0</span></h2>
      <div style="margin-bottom:10px;">
        <select id="dept-filter">
          <option value="all">Vše</option>
          <option value="bar">Bar</option>
          <option value="kuchyne">Kuchyně</option>
        </select>
      </div>
      <div class="req-grid" id="admin-requests"></div>
    </div>

    <div class="card">
      <h2>📋 Rozvrh směn</h2>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
        <button class="btn btn-export" id="export-btn">📸 Export obrázku</button>
        <button class="btn btn-copy" id="copy-btn">📋 Kopírovat z minulého týdne</button>
        <button class="btn btn-danger" id="reset-btn">🗑️ Smazat tento týden</button>
      </div>
      <div style="overflow-x:auto;">
        <table class="sched-table" id="sched-table"></table>
      </div>
    </div>

  </div>
</div>

<div id="export-preview"><table id="exp-tbl"></table></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL = "https://lspatclvnviuvlaoojho.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_R8E2ADPtvy6KNdjN0u4Kqw_9F9wf2Cn";
const ADMIN_PASSWORD = "havana2026";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const DAY_NAMES = ['Po','Út','St','Čt','Pá','So','Ne'];
const DAY_FULL = ['Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota','Neděle'];

let currentWeek = null, allRequests = [], scheduleData = {}, minBar = 1, minKuchyne = 1;

// Theme
const savedTheme = localStorage.getItem('theme') || 'light';
if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme','dark');
document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
document.getElementById('theme-btn').onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', cur);
  localStorage.setItem('theme', cur);
  document.getElementById('theme-btn').textContent = cur === 'dark' ? '☀️' : '🌙';
};

// Login
document.getElementById('login-btn').onclick = () => {
  if (document.getElementById('admin-pw').value === ADMIN_PASSWORD) {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('view-admin').style.display = 'block';
    initAdmin();
  } else { document.getElementById('login-error').style.display = 'block'; }
};
document.getElementById('admin-pw').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-btn').click(); });
document.getElementById('logout-btn').onclick = () => {
  document.getElementById('view-login').style.display = 'block';
  document.getElementById('view-admin').style.display = 'none';
};

async function initAdmin() {
  const { data: settings } = await sb.from('settings').select('*');
  if (settings) {
    const aw = settings.find(s=>s.key==='active_week');
    if (aw) { currentWeek = aw.value; document.getElementById('week-picker').value = aw.value; }
    const mb = settings.find(s=>s.key==='min_bar');
    if (mb) { minBar = parseInt(mb.value); document.getElementById('min-bar').value = minBar; }
    const mk = settings.find(s=>s.key==='min_kuchyne');
    if (mk) { minKuchyne = parseInt(mk.value); document.getElementById('min-kuchyne').value = minKuchyne; }
  }
  if (currentWeek) updateBadge();
  await loadAll();
}

async function loadAll() {
  const { data: reqs } = await sb.from('shift_requests').select('*');
  allRequests = reqs || [];
  const { data: scheds } = await sb.from('shift_schedule').select('*');
  scheduleData = {};
  (scheds||[]).forEach(s => {
    if (!scheduleData[s.week]) scheduleData[s.week] = {};
    scheduleData[s.week][s.name] = s.shifts;
  });
  renderTabs();
  if (currentWeek) { renderRequests(); renderSchedule(); }
  updateNotif();
}

function getWeekDates(mondayStr) {
  const monday = new Date(mondayStr+'T00:00:00');
  return Array.from({length:7},(_,i)=>{ const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}
function formatDate(d) { return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`; }
function nextMonday(mondayStr) {
  const d = new Date(mondayStr+'T00:00:00'); d.setDate(d.getDate()+7);
  return d.toISOString().split('T')[0];
}

function updateBadge() {
  if (!currentWeek) return;
  const d1 = getWeekDates(currentWeek);
  const w2 = nextMonday(currentWeek);
  const d2 = getWeekDates(w2);
  document.getElementById('active-badge').innerHTML = `<span class="week-badge">Aktivní: ${formatDate(d1[0])} – ${formatDate(d2[6])}</span>`;
  document.getElementById('req-label').textContent = `– ${formatDate(d1[0])} – ${formatDate(d2[6])}`;
}

function updateNotif() {
  if (!currentWeek) return;
  const w2 = nextMonday(currentWeek);
  const count = allRequests.filter(r => r.week === currentWeek || r.week === w2).length;
  const dot = document.getElementById('notif-dot');
  if (count > 0) { dot.textContent = count; dot.style.display = 'inline-flex'; }
  else { dot.style.display = 'none'; }
}

document.getElementById('set-week-btn').onclick = async () => {
  const val = document.getElementById('week-picker').value;
  if (!val) { alert('Vyber datum'); return; }
  const d = new Date(val+'T00:00:00');
  if (d.getDay() !== 1) { alert('Vyber prosím pondělí!'); return; }
  currentWeek = val;
  await sb.from('settings').upsert({key:'active_week',value:val},{onConflict:'key'});
  updateBadge(); renderTabs(); renderRequests(); renderSchedule(); updateNotif();
};

document.getElementById('save-min-btn').onclick = async () => {
  minBar = parseInt(document.getElementById('min-bar').value)||1;
  minKuchyne = parseInt(document.getElementById('min-kuchyne').value)||1;
  await sb.from('settings').upsert({key:'min_bar',value:String(minBar)},{onConflict:'key'});
  await sb.from('settings').upsert({key:'min_kuchyne',value:String(minKuchyne)},{onConflict:'key'});
  renderSchedule();
};

document.getElementById('dept-filter').onchange = renderRequests;

function renderTabs() {
  const allWeeks = [...new Set([
    ...allRequests.map(r=>r.week),
    ...Object.keys(scheduleData),
    currentWeek,
    currentWeek ? nextMonday(currentWeek) : null
  ].filter(Boolean))].sort().reverse();

  const c = document.getElementById('week-tabs');
  c.innerHTML = '';
  if (allWeeks.length === 0) { c.innerHTML = '<p style="font-size:13px; color:var(--text2);">Zatím žádná data.</p>'; return; }
  allWeeks.forEach(w => {
    const dates = getWeekDates(w);
    const btn = document.createElement('button');
    btn.className = 'week-tab' + (w === currentWeek ? ' active' : '');
    btn.textContent = `${formatDate(dates[0])} – ${formatDate(dates[6])}`;
    btn.onclick = () => {
      currentWeek = w;
      document.getElementById('week-picker').value = w;
      updateBadge();
      document.querySelectorAll('.week-tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      renderRequests(); renderSchedule();
    };
    c.appendChild(btn);
  });
}

function renderRequests() {
  const filter = document.getElementById('dept-filter').value;
  const w2 = nextMonday(currentWeek);
  const reqs = allRequests.filter(r => (r.week === currentWeek || r.week === w2) && (filter==='all' || r.dept === filter || r.dept === 'oboji'));
  const c = document.getElementById('admin-requests');
  c.innerHTML = '';
  if (reqs.length === 0) { c.innerHTML = '<p style="font-size:13px; color:var(--text2);">Zatím nikdo nezadal dostupnost.</p>'; return; }

  const byName = {};
  reqs.forEach(r => {
    if (!byName[r.name]) byName[r.name] = { dept: r.dept, weeks: {} };
    byName[r.name].weeks[r.week] = r.days;
  });

  Object.entries(byName).forEach(([name, data]) => {
    const card = document.createElement('div');
    card.className = 'req-card';
    const deptLabel = data.dept==='bar' ? 'Jen Bar' : data.dept==='kuchyne' ? 'Jen Kuchyně' : 'Bar i Kuchyně';
    let daysHtml = '';
    [currentWeek, w2].forEach((week, wi) => {
      const days = data.weeks[week];
      if (!days) return;
      const dates = getWeekDates(week);
      const avail = days.map((d,i)=>d.available ? `<div class="rday"><span class="avail">✓ ${DAY_NAMES[i]} ${formatDate(dates[i])}</span><span style="color:var(--text2); font-size:10px;">${d.note||''}</span></div>` : '').filter(Boolean).join('');
      if (avail) daysHtml += `<div style="font-size:10px; color:var(--text2); margin:4px 0 2px;">Týden ${wi+1}:</div>${avail}`;
    });
    card.innerHTML = `
      <button class="del-btn" data-name="${name}" title="Smazat">×</button>
      <div class="rname">${name}</div>
      <div class="rdept">${deptLabel}</div>
      ${daysHtml || '<span style="color:var(--text2);">Žádná dostupnost</span>'}
    `;
    card.querySelector('.del-btn').onclick = async e => {
      const n = e.target.dataset.name;
      if (!confirm(`Smazat ${n}?`)) return;
      await sb.from('shift_requests').delete().eq('name',n).in('week',[currentWeek, w2]);
      allRequests = allRequests.filter(r=>!(r.name===n && (r.week===currentWeek||r.week===w2)));
      renderRequests(); renderSchedule(); updateNotif();
    };
    c.appendChild(card);
  });
}

function renderSchedule() {
  const table = document.getElementById('sched-table');
  table.innerHTML = '';
  const w2 = nextMonday(currentWeek);
  const weekSchedule = scheduleData[currentWeek] || {};
  const dates = getWeekDates(currentWeek);
  const weekReqs = allRequests.filter(r => r.week === currentWeek);

  const thead = document.createElement('tr');
  thead.innerHTML = '<th style="width:120px;">Den</th><th>Přiřazené směny</th><th style="width:200px;">Přidat směnu</th>';
  table.appendChild(thead);

  dates.forEach((date, di) => {
    const tr = document.createElement('tr');
    const tdDay = document.createElement('td');
    tdDay.innerHTML = `<b>${DAY_FULL[di]}</b><br><span style="font-size:11px; color:var(--text2);">${formatDate(date)}</span>`;
    const tdShifts = document.createElement('td');
    const sc = document.createElement('div');
    let cBar = 0, cKuc = 0;

    Object.entries(weekSchedule).forEach(([name, shifts]) => {
      const shift = shifts[di];
      if (!shift||!shift.dept) return;
      if (shift.dept==='bar') cBar++;
      if (shift.dept==='kuchyne') cKuc++;
      const slot = document.createElement('div');
      slot.className = 'shift-slot';
      slot.innerHTML = `
        <span class="dept-badge ${shift.dept==='bar'?'badge-bar':'badge-kuchyne'}">${shift.dept==='bar'?'Bar':'Kuchyně'}</span>
        <span style="font-weight:600; font-size:12px;">${name}</span>
        <input type="text" class="time-input" placeholder="8:00–16:00" value="${shift.time||''}" />
        <button class="rm-btn" data-name="${name}" data-day="${di}">×</button>
      `;
      slot.querySelector('.time-input').onchange = async e => await saveShift(name,di,shift.dept,e.target.value);
      slot.querySelector('.rm-btn').onclick = async () => { await saveShift(name,di,null,''); renderSchedule(); };
      sc.appendChild(slot);
    });

    const cov = document.createElement('div');
    cov.className = 'cov-row';
    cov.innerHTML = `
      <span class="cov-badge ${cBar>=minBar?'cov-ok':'cov-warn'}">Bar: ${cBar}/${minBar}</span>
      <span class="cov-badge ${cKuc>=minKuchyne?'cov-ok':'cov-warn'}">Kuchyně: ${cKuc}/${minKuchyne}</span>
    `;
    tdShifts.appendChild(sc);
    tdShifts.appendChild(cov);

    const tdAdd = document.createElement('td');
    const avail = weekReqs.filter(r => r.days && r.days[di] && r.days[di].available);
    if (avail.length === 0) {
      tdAdd.innerHTML = '<span style="font-size:12px; color:var(--text2);">Nikdo dostupný</span>';
    } else {
      const row = document.createElement('div');
      row.className = 'add-row';
      const ns = document.createElement('select');
      ns.innerHTML = '<option value="">-- Jméno --</option>';
      avail.forEach(r => {
        const assigned = weekSchedule[r.name]&&weekSchedule[r.name][di]&&weekSchedule[r.name][di].dept;
        const note = r.days[di].note ? ` (${r.days[di].note})` : '';
        const o = document.createElement('option');
        o.value = r.name;
        o.textContent = r.name + note + (assigned?' ✓':'');
        ns.appendChild(o);
      });
      const ds = document.createElement('select');
      ds.innerHTML = '<option value="bar">Bar</option><option value="kuchyne">Kuchyně</option>';
      const ab = document.createElement('button');
      ab.className = 'btn btn-dark';
      ab.textContent = '+ Přidat';
      ab.onclick = async () => {
        if (!ns.value) { alert('Vyber jméno'); return; }
        await saveShift(ns.value, di, ds.value, '');
        renderSchedule();
      };
      row.appendChild(ns); row.appendChild(ds); row.appendChild(ab);
      tdAdd.appendChild(row);
    }
    tr.appendChild(tdDay); tr.appendChild(tdShifts); tr.appendChild(tdAdd);
    table.appendChild(tr);
  });
}

async function saveShift(name, di, dept, time) {
  if (!scheduleData[currentWeek]) scheduleData[currentWeek] = {};
  if (!scheduleData[currentWeek][name]) scheduleData[currentWeek][name] = Array(7).fill(null).map(()=>({dept:null,time:''}));
  scheduleData[currentWeek][name][di] = {dept, time};
  await sb.from('shift_schedule').upsert({name, week:currentWeek, shifts:scheduleData[currentWeek][name]},{onConflict:'name,week'});
}

document.getElementById('copy-btn').onclick = async () => {
  const weeks = [...new Set(Object.keys(scheduleData))].sort();
  const prevWeek = weeks.filter(w => w < currentWeek).pop();
  if (!prevWeek) { alert('Žádný předchozí týden k zkopírování.'); return; }
  if (!confirm(`Kopírovat rozvrh z ${formatDate(getWeekDates(prevWeek)[0])}?`)) return;
  const prev = scheduleData[prevWeek];
  if (!prev) return;
  scheduleData[currentWeek] = JSON.parse(JSON.stringify(prev));
  for (const [name, shifts] of Object.entries(scheduleData[currentWeek])) {
    await sb.from('shift_schedule').upsert({name, week:currentWeek, shifts},{onConflict:'name,week'});
  }
  renderSchedule();
};

document.getElementById('export-btn').onclick = async () => {
  const dates = getWeekDates(currentWeek);
  const ws = scheduleData[currentWeek] || {};
  const tbl = document.getElementById('exp-tbl');
  tbl.innerHTML = '';
  const tr0 = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.colSpan = 8;
  th0.textContent = `Rozvrh směn Havana: ${formatDate(dates[0])} – ${formatDate(dates[6])}`;
  th0.style.textAlign = 'center'; th0.style.fontSize = '14px';
  tr0.appendChild(th0); tbl.appendChild(tr0);
  const tr1 = document.createElement('tr');
  tr1.innerHTML = '<th>Zaměstnanec</th>' + DAY_NAMES.map((d,i)=>`<th>${d}<br><small>${formatDate(dates[i])}</small>`).join('');
  tbl.appendChild(tr1);
  Object.entries(ws).forEach(([name, shifts]) => {
    const row = document.createElement('tr');
    const nc = document.createElement('td');
    nc.textContent = name; nc.style.fontWeight = '600';
    row.appendChild(nc);
    shifts.forEach(shift => {
      const td = document.createElement('td');
      if (shift&&shift.dept) {
        td.innerHTML = `<span class="${shift.dept==='bar'?'exp-bar':'exp-kuchyne'}">${shift.dept==='bar'?'Bar':'Kuchyně'}</span>${shift.time?'<br>'+shift.time:''}`;
      } else { td.textContent = '–'; td.style.color = '#ccc'; }
      row.appendChild(td);
    });
    tbl.appendChild(row);
  });
  const preview = document.getElementById('export-preview');
  preview.style.display = 'block';
  const canvas = await html2canvas(tbl, {backgroundColor:'#ffffff', scale:2});
  preview.style.display = 'none';
  const link = document.createElement('a');
  link.download = `rozvrh_${currentWeek}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
};

document.getElementById('reset-btn').onclick = async () => {
  if (!confirm('Smazat celý rozvrh pro tento týden?')) return;
  await sb.from('shift_schedule').delete().eq('week', currentWeek);
  if (scheduleData[currentWeek]) delete scheduleData[currentWeek];
  renderSchedule();
};

// ─── POČASÍ – Suchý u Boskovic (49.4828, 16.7625) ─────────────────────────
const WMO_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️', 56:'🌧️', 57:'🌧️',
  61:'🌧️', 63:'🌧️', 65:'🌧️', 66:'🌧️', 67:'🌧️',
  71:'🌨️', 73:'🌨️', 75:'❄️', 77:'❄️',
  80:'🌦️', 81:'🌧️', 82:'⛈️', 85:'🌨️', 86:'❄️',
  95:'⛈️', 96:'⛈️', 99:'⛈️'
};
const WMO_DESC = {
  0:'Jasno', 1:'Převážně jasno', 2:'Polojasno', 3:'Zataženo',
  45:'Mlha', 48:'Námrazová mlha',
  51:'Slabé mrholení', 53:'Mrholení', 55:'Silné mrholení',
  56:'Mrznoucí mrholení', 57:'Silné mrznoucí mrholení',
  61:'Slabý déšť', 63:'Déšť', 65:'Silný déšť',
  66:'Mrznoucí déšť', 67:'Silný mrznoucí déšť',
  71:'Slabé sněžení', 73:'Sněžení', 75:'Silné sněžení', 77:'Sněhové krupky',
  80:'Přeháňky', 81:'Přeháňky', 82:'Silné přeháňky',
  85:'Sněhové přeháňky', 86:'Silné sněhové přeháňky',
  95:'Bouřka', 96:'Bouřka s krupobitím', 99:'Silná bouřka'
};
const DAY_CZ = ['Ne','Po','Út','St','Čt','Pá','So'];
const WIND_DIRS = ['S','SV','V','JV','J','JZ','Z','SZ'];

function renderWeather(cur, daily, zdroj) {
  const todayStr = new Date().toISOString().split('T')[0];
  const icon = WMO_ICONS[cur.code] || '🌡️';
  const desc = WMO_DESC[cur.code] || '';
  const windDirStr = WIND_DIRS[Math.round(cur.windDir / 45) % 8] || '';

  let html = `
    <div class="weather-now">
      <div class="wn-icon">${icon}</div>
      <div>
        <div class="wn-temp">${Math.round(cur.temp)}°C</div>
        <div class="wn-desc">${desc}</div>
        <div class="wn-details">
          Pocitově: ${Math.round(cur.feels)}°C &nbsp;·&nbsp;
          Vlhkost: ${cur.humidity} % &nbsp;·&nbsp;
          Vítr: ${Math.round(cur.wind)} km/h ${windDirStr}
        </div>
      </div>
    </div>
    <div class="weather-grid">`;

  daily.forEach(d => {
    const date = new Date(d.date + 'T00:00:00');
    const isToday = d.date === todayStr;
    const wicon = WMO_ICONS[d.code] || '🌡️';
    html += `
      <div class="weather-day${isToday ? ' today' : ''}">
        <div class="wd-name">${isToday ? 'Dnes' : DAY_CZ[date.getDay()]}</div>
        <div class="wd-date">${date.getDate()}.${date.getMonth()+1}.</div>
        <div class="wd-icon">${wicon}</div>
        <div class="wd-temp">${Math.round(d.max)}° <span>/ ${Math.round(d.min)}°</span></div>
        <div class="wd-rain">${d.rain > 0 ? '💧 ' + d.rain.toFixed(1) + ' mm' : '&nbsp;'}</div>
        <div class="wd-wind">💨 ${Math.round(d.wind)} km/h</div>
      </div>`;
  });

  html += '</div>';
  document.getElementById('weather-body').innerHTML = html;
  document.getElementById('weather-source').textContent = 'Zdroj: ' + zdroj;
}

async function loadWeather() {
  document.getElementById('weather-body').innerHTML =
    '<div style="font-size:13px; color:var(--text2);">Načítám počasí…</div>';
  const chyby = [];

  // Převede odpověď Open-Meteo do našeho formátu a vykreslí
  const zpracujOpenMeteo = (d, zdroj) => {
    renderWeather(
      { temp: d.current.temperature_2m, feels: d.current.apparent_temperature,
        humidity: d.current.relative_humidity_2m, code: d.current.weather_code,
        wind: d.current.wind_speed_10m, windDir: d.current.wind_direction_10m },
      d.daily.time.map((t, i) => ({
        date: t, code: d.daily.weather_code[i],
        max: d.daily.temperature_2m_max[i], min: d.daily.temperature_2m_min[i],
        rain: d.daily.precipitation_sum[i], wind: d.daily.wind_speed_10m_max[i]
      })),
      zdroj
    );
  };

  // ── Zdroj 1: vlastní serverová funkce (/api/weather) ──
  // Stejná doména = žádný CORS. Server umí přečíst i chybové odpovědi
  // a v případě potřeby sáhne po záložním zdroji. Vrací sjednocený formát.
  try {
    const res = await fetch('/api/weather');
    const d = await res.json().catch(() => null);
    if (!res.ok || !d || d.error) {
      throw new Error((d && d.error) || ('HTTP ' + res.status));
    }
    renderWeather(d.current, d.daily, d.source);
    return;
  } catch(e) {
    chyby.push('/api/weather: ' + e.message);
    console.warn('/api/weather selhal:', e);
  }

  // ── Zdroj 2: Open-Meteo napřímo ──
  try {
    const url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=49.4828&longitude=16.7625'
      + '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m'
      + '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max'
      + '&timezone=auto&forecast_days=7';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    zpracujOpenMeteo(d, 'Open-Meteo.com');
    return;
  } catch(e) {
    chyby.push('Open-Meteo: ' + e.message);
    console.warn('Open-Meteo selhal:', e);
  }

  // ── Zdroj 2: wttr.in ──
  try {
    const res = await fetch('https://wttr.in/49.4828,16.7625?format=j1');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    const c = d.current_condition[0];
    const W2M = { 113:0, 116:2, 119:3, 122:3, 143:45, 176:80, 179:71, 182:66, 185:56,
      200:95, 227:73, 230:75, 248:45, 260:48, 263:51, 266:53, 281:56, 284:57,
      293:61, 296:61, 299:63, 302:63, 305:65, 308:65, 311:66, 314:67, 317:66,
      320:73, 323:71, 326:71, 329:73, 332:75, 335:75, 338:75, 350:77, 353:80,
      356:81, 359:82, 362:85, 365:85, 368:85, 371:86, 374:66, 377:67,
      386:95, 389:96, 392:95, 395:86 };
    renderWeather(
      { temp: +c.temp_C, feels: +c.FeelsLikeC, humidity: +c.humidity,
        code: W2M[+c.weatherCode] ?? 3, wind: +c.windspeedKmph,
        windDir: +c.winddirDegree },
      d.weather.slice(0, 7).map(day => ({
        date: day.date,
        code: W2M[+(day.hourly[4]?.weatherCode || 113)] ?? 3,
        max: +day.maxtempC, min: +day.mintempC,
        rain: day.hourly.reduce((s, h) => s + parseFloat(h.precipMM || 0), 0),
        wind: Math.max(...day.hourly.map(h => +h.windspeedKmph || 0))
      })),
      'wttr.in'
    );
    return;
  } catch(e) {
    chyby.push('wttr.in: ' + e.message);
    console.warn('wttr.in selhal:', e);
  }

  // ── Všechny zdroje selhaly – ukážeme PŘESNOU chybu na stránce ──
  document.getElementById('weather-body').innerHTML = `
    <div id="weather-error">
      <b>⚠️ Počasí se nepodařilo načíst.</b><br><br>
      Přesné chyby (pošli mi tento text):<br>
      ${chyby.map(c => `<code>${c}</code>`).join('<br>')}
      <br><br>
      <b>Co která chyba znamená:</b><br>
      • <code>/api/weather: HTTP 404</code> – v repozitáři chybí soubor
        <code>api/weather.js</code>.<br>
      • <code>Failed to fetch</code> u přímých zdrojů je normální – při chybě
        neposílají CORS hlavičku. Řeší to právě <code>/api/weather</code>.<br>
      • <code>overloaded</code> – zdroje mají výpadek, zkus to za pár minut
        tlačítkem 🔄.
      <br><br>
      <a href="https://www.meteoblue.com/en/weather/week/such%C3%BD_czechia_3077868" target="_blank" style="color:var(--blue);">
        Zatím zobrazit počasí na meteoblue →
      </a>
    </div>`;
}

document.getElementById('weather-reload-btn').onclick = loadWeather;

// ── Export počasí jako obrázek ──
document.getElementById('weather-export-btn').onclick = async () => {
  const btn = document.getElementById('weather-export-btn');
  const card = document.getElementById('weather-card');
  if (!card.querySelector('.weather-grid')) {
    alert('Nejdřív musí být počasí načteno.');
    return;
  }
  const orig = btn.textContent;
  btn.textContent = '⏳ Generuji…';
  btn.disabled = true;

  // Skryjeme tlačítka aby nebyla na obrázku
  const btnRow = btn.parentElement.parentElement;
  btnRow.style.visibility = 'hidden';

  try {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const canvas = await html2canvas(card, {
      backgroundColor: isDark ? '#1e1e2e' : '#ffffff',
      scale: 2
    });
    const link = document.createElement('a');
    link.download = `pocasi_suchy_${new Date().toISOString().split('T')[0]}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Export se nepodařil: ' + e.message);
    console.error(e);
  }

  btnRow.style.visibility = 'visible';
  btn.textContent = orig;
  btn.disabled = false;
};

loadWeather();
</script>
