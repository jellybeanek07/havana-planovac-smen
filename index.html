<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a2e" />
<link rel="manifest" href="manifest.json" />
<title>Zadej dostupnost</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --text2: #666;
    --border: #e0e0e0;
    --primary: #1a1a2e;
    --blue-bg: #e8f0fe;
    --blue-text: #1a6fa8;
    --green: #1a7a40;
    --green-bg: #e6f9ee;
    --red: #b00020;
    --red-bg: #fdecea;
    --selected-bg: #f0f8ff;
    --selected-border: #1a6fa8;
  }
  [data-theme="dark"] {
    --bg: #0f0f1a;
    --card: #1e1e2e;
    --text: #e0e0e0;
    --text2: #999;
    --border: #333;
    --primary: #3a3a6e;
    --blue-bg: #1a2a4a;
    --blue-text: #7ab3e0;
    --green: #4ade80;
    --green-bg: #0a2a1a;
    --red: #f87171;
    --red-bg: #2a0a0a;
    --selected-bg: #1a2a3a;
    --selected-border: #7ab3e0;
  }
  * { box-sizing: border-box; font-family: -apple-system, Arial, sans-serif; transition: background 0.2s, color 0.2s; }
  body { margin: 0; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--primary); color: white; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .header h1 { margin: 0; font-size: 18px; }
  .header p { margin: 2px 0 0; font-size: 12px; opacity: 0.7; }
  .theme-btn { background: rgba(255,255,255,0.15); border: none; color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .container { max-width: 540px; margin: 0 auto; padding: 12px; }
  .card { background: var(--card); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border: 1px solid var(--border); }
  .card h2 { margin: 0 0 10px; font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  input[type=text], select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; margin-bottom: 10px; background: var(--card); color: var(--text); outline: none; }
  input:focus, select:focus { border-color: var(--selected-border); }
  .week-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .week-badge { background: var(--blue-bg); color: var(--blue-text); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; }
  .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .day-item { border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: all 0.15s; }
  .day-item.selected { border-color: var(--selected-border); background: var(--selected-bg); }
  .day-top { display: flex; align-items: center; gap: 8px; }
  .day-cb { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); flex-shrink: 0; }
  .day-name { font-size: 14px; font-weight: 600; }
  .day-date { font-size: 11px; color: var(--text2); margin-left: auto; }
  .day-note { margin-top: 6px; display: none; }
  .day-item.selected .day-note { display: block; }
  .day-note input { margin: 0; padding: 6px 8px; font-size: 12px; }
  .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .submit-btn:active { opacity: 0.85; }
  #status { display: none; padding: 14px; border-radius: 10px; background: var(--green-bg); color: var(--green); font-weight: 600; font-size: 14px; margin-top: 10px; text-align: center; }
  #error { display: none; padding: 12px; border-radius: 10px; background: var(--red-bg); color: var(--red); font-size: 13px; margin-top: 10px; text-align: center; }
  .no-week { text-align: center; padding: 40px 20px; color: var(--text2); }
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .confirm-overlay.show { display: flex; }
  .confirm-box { background: var(--card); border-radius: 16px; padding: 20px; max-width: 400px; width: 100%; }
  .confirm-box h3 { margin: 0 0 12px; font-size: 16px; }
  .confirm-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .confirm-row:last-of-type { border: none; }
  .confirm-btns { display: flex; gap: 8px; margin-top: 16px; }
  .confirm-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-confirm { background: var(--primary); color: white; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>📅 Plánovač směn</h1>
    <p>Zadej kdy můžeš pracovat</p>
  </div>
  <button class="theme-btn" id="theme-btn" title="Přepnout motiv">🌙</button>
</div>

<div class="container">
  <div id="no-week" class="card no-week" style="display:none;">
    ⏳ Admin zatím nenastavil plánovaný týden. Zkus to znovu později.
  </div>

  <div id="main-form">
    <div class="card">
      <h2>Tvoje info</h2>
      <input type="text" id="emp-name" placeholder="Jméno a příjmení" />
      <select id="emp-dept">
        <option value="oboji">Bar i Kuchyně (obojí)</option>
        <option value="bar">Jen Bar</option>
        <option value="kuchyne">Jen Kuchyně</option>
      </select>
    </div>

    <div id="weeks-container"></div>

    <button class="submit-btn" id="emp-submit">✅ Odeslat dostupnost</button>
    <div id="status">✅ Odesláno! Děkujeme, dostupnost byla uložena.</div>
    <div id="error"></div>
  </div>
</div>

<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Zkontroluj dostupnost</h3>
    <div id="confirm-content"></div>
    <div class="confirm-btns">
      <button class="btn-cancel" id="confirm-cancel">Upravit</button>
      <button class="btn-confirm" id="confirm-ok">Odeslat ✅</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const SUPABASE_URL = "https://lspatclvnviuvlaoojho.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_R8E2ADPtvy6KNdjN0u4Kqw_9F9wf2Cn";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const DAY_NAMES = ['Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota','Neděle'];

// Theme
const savedTheme = localStorage.getItem('theme') || 'light';
if (savedTheme === 'dark') document.documentElement.setAttribute('data-theme','dark');
document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
document.getElementById('theme-btn').onclick = () => {
  const cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', cur);
  localStorage.setItem('theme', cur);
  document.getElementById('theme-btn').textContent = cur === 'dark' ? '☀️' : '🌙';
};

function getWeekDates(mondayStr) {
  const monday = new Date(mondayStr + 'T00:00:00');
  return Array.from({length:7}, (_,i) => { const d = new Date(monday); d.setDate(monday.getDate()+i); return d; });
}
function formatDate(d) { return `${d.getDate()}.${d.getMonth()+1}.`; }
function nextMonday(mondayStr) {
  const d = new Date(mondayStr + 'T00:00:00');
  d.setDate(d.getDate()+7);
  return d.toISOString().split('T')[0];
}

let activeWeeks = [];

async function init() {
  const saved = localStorage.getItem('emp-name');
  if (saved) document.getElementById('emp-name').value = saved;

  const { data } = await sb.from('settings').select('value').eq('key','active_week').single();
  if (!data) {
    document.getElementById('no-week').style.display = 'block';
    document.getElementById('main-form').style.display = 'none';
    return;
  }
  const week1 = data.value;
  const week2 = nextMonday(week1);
  activeWeeks = [week1, week2];
  renderWeeks();
}

function renderWeeks() {
  const container = document.getElementById('weeks-container');
  container.innerHTML = '';
  activeWeeks.forEach((week, wi) => {
    const dates = getWeekDates(week);
    const card = document.createElement('div');
    card.className = 'card';
    const header = document.createElement('div');
    header.className = 'week-header';
    header.innerHTML = `<span style="font-size:14px; font-weight:600;">Týden ${wi+1}</span><span class="week-badge">${formatDate(dates[0])} – ${formatDate(dates[6])}${dates[6].getFullYear()}</span>`;
    card.appendChild(header);
    const grid = document.createElement('div');
    grid.className = 'day-grid';
    dates.forEach((date, di) => {
      const item = document.createElement('div');
      item.className = 'day-item';
      item.dataset.week = wi;
      item.dataset.day = di;
      item.innerHTML = `
        <div class="day-top">
          <input type="checkbox" class="day-cb" data-week="${wi}" data-day="${di}" />
          <span class="day-name">${DAY_NAMES[di]}</span>
          <span class="day-date">${formatDate(date)}</span>
        </div>
        <div class="day-note">
          <input type="text" class="note-input" placeholder="Poznámka (např. od 14h)" />
        </div>
      `;
      const cb = item.querySelector('.day-cb');
      cb.addEventListener('change', () => item.classList.toggle('selected', cb.checked));
      item.addEventListener('click', e => {
        if (e.target === cb || e.target.tagName === 'INPUT') return;
        cb.checked = !cb.checked;
        cb.dispatchEvent(new Event('change'));
      });
      grid.appendChild(item);
    });
    card.appendChild(grid);
    container.appendChild(card);
  });
}

document.getElementById('emp-submit').onclick = () => {
  const name = document.getElementById('emp-name').value.trim();
  if (!name) { alert('Vyplň prosím jméno.'); return; }
  localStorage.setItem('emp-name', name);
  const dept = document.getElementById('emp-dept').value;

  let html = `<p style="font-size:13px; color:var(--text2); margin:0 0 10px;">${name} · ${dept === 'bar' ? 'Jen Bar' : dept === 'kuchyne' ? 'Jen Kuchyně' : 'Bar i Kuchyně'}</p>`;
  activeWeeks.forEach((week, wi) => {
    const dates = getWeekDates(week);
    const items = document.querySelectorAll(`.day-item[data-week="${wi}"]`);
    const avail = [];
    items.forEach((item, di) => {
      const cb = item.querySelector('.day-cb');
      const note = item.querySelector('.note-input').value.trim();
      if (cb.checked) avail.push(`${DAY_NAMES[di]} ${formatDate(dates[di])}${note ? ' ('+note+')' : ''}`);
    });
    html += `<div class="confirm-row"><span><b>Týden ${wi+1}</b></span><span>${avail.length > 0 ? avail.join(', ') : 'žádná dostupnost'}</span></div>`;
  });

  document.getElementById('confirm-content').innerHTML = html;
  document.getElementById('confirm-overlay').classList.add('show');
};

document.getElementById('confirm-cancel').onclick = () => {
  document.getElementById('confirm-overlay').classList.remove('show');
};

document.getElementById('confirm-ok').onclick = async () => {
  document.getElementById('confirm-overlay').classList.remove('show');
  await submitData();
};

async function submitData() {
  const name = document.getElementById('emp-name').value.trim();
  const dept = document.getElementById('emp-dept').value;
  const statusEl = document.getElementById('status');
  const errorEl = document.getElementById('error');
  statusEl.style.display = 'none';
  errorEl.style.display = 'none';

  for (const [wi, week] of activeWeeks.entries()) {
    const items = document.querySelectorAll(`.day-item[data-week="${wi}"]`);
    const days = Array.from(items).map(item => ({
      available: item.querySelector('.day-cb').checked,
      note: item.querySelector('.note-input').value.trim()
    }));
    const { error } = await sb.from('shift_requests').upsert(
      { name, dept, week, days }, { onConflict: 'name,week' }
    );
    if (error) {
      errorEl.textContent = 'Chyba: ' + error.message;
      errorEl.style.display = 'block';
      return;
    }
  }
  statusEl.style.display = 'block';
  window.scrollTo(0, document.body.scrollHeight);
}

init();
</script>
</body>
</html>
