<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zadat volno - Plánovač směn</title>
<style>
  * { box-sizing: border-box; font-family: Arial, sans-serif; }
  body { margin: 0; padding: 16px; background: #f4f4f4; color: #222; }
  .container { max-width: 500px; margin: 0 auto; }
  h1 { font-size: 20px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
  input[type=text], select { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
  .days { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
  .days label { display: flex; align-items: center; gap: 8px; border: 1px solid #ccc; border-radius: 6px; padding: 12px; font-size: 14px; margin: 0; background: #fff; cursor: pointer; }
  .days input { width: 18px; height: 18px; cursor: pointer; }
  button.primary { width: 100%; padding: 12px; background: #333; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
  #status { color: green; font-size: 14px; margin-top: 12px; display: none; text-align: center; }
  #error { color: #b00020; font-size: 13px; margin-top: 12px; display: none; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>Zadej svoje volno na příští týden</h1>
  <label>Jméno</label>
  <input type="text" id="emp-name" placeholder="Tvoje jméno" />
  <label>Oddělení</label>
  <select id="emp-dept">
    <option value="bar">Bar</option>
    <option value="kuchyne">Kuchyně</option>
  </select>
  <label>Zaškrtni dny, kdy NEMŮŽEŠ (volno):</label>
  <div class="days" id="emp-days"></div>
  <button class="primary" id="emp-submit">Odeslat požadavek</button>
  <p id="status">Uloženo, děkujeme!</p>
  <p id="error"></p>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = "https://lspatclvnviuvlaoojho.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_R8E2ADPtvy6KNdjN0u4Kqw_9F9wf2Cn";

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const DAYS = ['Po','Út','St','Čt','Pá','So','Ne'];

const empDaysDiv = document.getElementById('emp-days');
DAYS.forEach((d, i) => {
  const label = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'off-day';
  cb.dataset.day = i;
  label.appendChild(cb);
  label.appendChild(document.createTextNode(d));
  empDaysDiv.appendChild(label);
});

document.getElementById('emp-submit').onclick = async () => {
  const name = document.getElementById('emp-name').value.trim();
  const dept = document.getElementById('emp-dept').value;
  const statusEl = document.getElementById('status');
  const errorEl = document.getElementById('error');
  statusEl.style.display = 'none';
  errorEl.style.display = 'none';

  if (!name) { alert('Vyplň jméno'); return; }

  const off = Array.from(document.querySelectorAll('.off-day')).map(cb => cb.checked);

  const { error } = await sb
    .from('shift_requests')
    .upsert({ name, dept, off_days: off }, { onConflict: 'name' });

  if (error) {
    errorEl.textContent = 'Chyba: ' + error.message;
    errorEl.style.display = 'block';
    return;
  }
  statusEl.style.display = 'block';
};
</script>
</body>
</html>
